<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QCD0003 Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<meta name="apple-mobile-web-app-capable" content="yes">

<style>

body {
    font-family: Verdana;
    background: #eee;
    padding: 10px;
}

/* FORM PANEL */
.form-box {
    background: white;
    padding: 15px;
    border-radius: 10px;
}

/* PDF PAGE */
#pdf {
    width: 210mm;
    min-height: 297mm;
    padding: 20mm;
    background-image: url('watermark.png');
    background-size: cover;
    box-sizing: border-box;
}

/* HEADER RIGHT */
.header-right {
    position: absolute;
    top: 20mm;
    right: 20mm;
    font-size: 10px;
}

/* TITLE */
.title {
    text-align: center;
    font-family: "Copperplate Gothic Bold";
    font-size: 24px;
    color: #948671;
    margin-top: 30px;
}

/* SECTION */
.section {
    margin-top: 15px;
    page-break-inside: avoid;
}

.section-title {
    color: red;
    font-size: 12px;
    font-weight: bold;
}

/* TABLE */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
}

td {
    border: 1px solid #000;
    padding: 5px;
    vertical-align: top;
}

/* INPUT */
input, select, textarea {
    width: 100%;
    font-size: 10px;
}

/* BUTTON */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

/* CANVAS */
canvas {
    border: 1px solid #ccc;
    margin-top: 5px;
}

</style>
</head>

<body>

<div class="form-box">

<h2>Fill Report</h2>

<label>Report Type</label>
<select id="type" onchange="setPrefix()">
<option value="">Select</option>
<option value="NCP">Non-Conformance Product</option>
<option value="CIF">Continuous Improvement Findings</option>
</select>

<label>Report No</label>
<input id="no">

<label>Date</label>
<input type="date" id="date">

<label>Issued By</label>
<select id="issuer">
<option>Ahmad Fudhail</option>
<option>Wan M. Afif</option>
<option value="other">Other</option>
</select>

<input id="issuerOther" placeholder="Other name">

<label>Description</label>
<textarea id="desc"></textarea>

<label>Upload Photos</label>
<input type="file" multiple id="photos" onchange="loadImages()">

<div id="canvasBox"></div>

<button onclick="generate()">Generate PDF</button>

</div>


<!-- PDF -->
<div id="pdf" style="display:none; position:relative;"></div>


<script>

let canvases = [];

/* PREFIX */
function setPrefix(){
    let t = type.value;
    no.value = t + "-";
}

/* LOAD IMAGES */
function loadImages(){

    canvasBox.innerHTML = "";
    canvases = [];

    let files = photos.files;

    for(let i=0;i<files.length && i<3;i++){

        let reader = new FileReader();

        reader.onload = e => {

            let canvas = document.createElement("canvas");
            let ctx = canvas.getContext("2d");

            let img = new Image();
            img.onload = ()=>{
                canvas.width = 300;
                canvas.height = 200;
                ctx.drawImage(img,0,0,300,200);
            }
            img.src = e.target.result;

            enableDraw(canvas, ctx);

            canvasBox.appendChild(canvas);
            canvases.push(canvas);
        }

        reader.readAsDataURL(files[i]);
    }
}

/* DRAW */
function enableDraw(c, ctx){

    let draw=false;

    function pos(e){
        let r=c.getBoundingClientRect();
        return {
            x:(e.touches?e.touches[0].clientX:e.clientX)-r.left,
            y:(e.touches?e.touches[0].clientY:e.clientY)-r.top
        }
    }

    c.onmousedown=e=>{draw=true; let p=pos(e); ctx.moveTo(p.x,p.y);}
    c.onmousemove=e=>{if(!draw)return; let p=pos(e); ctx.lineTo(p.x,p.y); ctx.stroke();}
    c.onmouseup=()=>draw=false;

    c.ontouchstart=e=>{draw=true;}
    c.ontouchmove=e=>{
        if(!draw)return;
        e.preventDefault();
        let p=pos(e);
        ctx.lineTo(p.x,p.y);
        ctx.stroke();
    }
    c.ontouchend=()=>draw=false;
}


/* GENERATE PDF */
function generate(){

pdf.innerHTML = `

<div class="header-right">
Document No: QCD0003<br>
Version: 0<br>
Date: 3/11/2025
</div>

<div class="title">Quality Assessment Report</div>

<div class="section">
<div class="section-title">Section 1 – Basic Information</div>

<table>
<tr>
<td>Report Type</td>
<td>${type.value}</td>
<td>Report No</td>
<td>${no.value}</td>
</tr>

<tr>
<td>Date Issued</td>
<td>${date.value}</td>
<td>Issued By</td>
<td>${issuer.value === "other" ? issuerOther.value : issuer.value}</td>
</tr>
</table>
</div>

<div class="section">
<div class="section-title">Section 2 – Description</div>

<table>
<tr>
<td>Description</td>
<td>${desc.value}</td>
</tr>
</table>
</div>
`;

/* ADD IMAGES */
if(canvases.length>0){

    let html = "<div class='section'><table><tr>";

    canvases.forEach(c=>{
        html += `<td><img src="${c.toDataURL()}" width="150"></td>`;
    });

    html += "</tr></table></div>";

    pdf.innerHTML += html;
}

/* SECTION 3 */
pdf.innerHTML += `
<div class="section">
<div class="section-title">Section 3 – QC Lead Review</div>

<table>
<tr>
<td>Remarks</td>
<td>__________</td>
</tr>
</table>
</div>
`;

/* SECTION 4 */
pdf.innerHTML += `
<div class="section">
<div class="section-title">Section 4 – MRB Review</div>

<table>
<tr>
<td>Decision</td>
<td>__________</td>
</tr>
</table>
</div>
`;

/* SECTION 5 */
pdf.innerHTML += `
<div class="section">
<div class="section-title">Section 5 – Approval</div>

<table>
<tr>
<td>Talon Engineering</td>
<td>Supplier</td>
</tr>
<tr>
<td height="50"></td>
<td></td>
</tr>
</table>
</div>
`;

html2pdf().from(pdf).set({
    margin:0,
    filename:no.value+".pdf",
    html2canvas:{scale:2},
    jsPDF:{unit:'mm',format:'a4'}
}).save();

}

</script>

</body>
</html>
